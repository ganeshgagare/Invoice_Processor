server:
  port: 8081
spring:
  application:
    name: ingestion-service
  datasource:
    url: jdbc:postgresql://localhost:5432/reportdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
logging:
  level:
    com.t2: DEBUG
