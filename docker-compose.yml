version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: rpp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reportdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d reportdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  eureka-server:
    build:
      context: ./backend
      dockerfile: eureka-server/Dockerfile
    container_name: rpp-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  ingestion-service:
    build:
      context: ./backend
      dockerfile: ingestion-service/Dockerfile
    container_name: rpp-ingestion
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reportdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15

  query-service:
    build:
      context: ./backend
      dockerfile: query-service/Dockerfile
    container_name: rpp-query
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reportdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      GEMINI_API_KEY: ${GEMINI_API_KEY:-AIzaSyAUzpw6psIELy-ZYMcr0uvcVUlC3-dCza0}
    ports:
      - "8082:8082"
    depends_on:
      ingestion-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15

  export-service:
    build:
      context: ./backend
      dockerfile: export-service/Dockerfile
    container_name: rpp-export
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: rpp-gateway
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8080:8080"
    depends_on:
      ingestion-service:
        condition: service_healthy
      query-service:
        condition: service_healthy
      export-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rpp-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
